name: Terraform Infra Workflow
on:
 push:
   branches:
     - main

jobs:
  terraform_install_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: HashiCorp
        uses: hashicorp/setup-terraform@v2.0.3

      - name: check terraform version
        run: terraform version
        
      
      
       


    

  
  
  
  
     



    
